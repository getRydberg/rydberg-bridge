services:
  backend-bridge:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rydberg-backend-bridge
    restart: unless-stopped
    profiles:
      - bridge

    # This module needs broader host access than any other Rydberg module —
    # its entire job is reporting on the host and other containers, not
    # running an isolated app. See README.md for the reasoning per mount.
    volumes:
      # Talk to the HOST's Docker daemon (list all containers, not just this one).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Host resource stats — read-only.
      - /proc:/host/proc:ro
      # tmux/screen sockets live here. Runs as root (no USER in the
      # Dockerfile), which is what lets this read host tmux/screen sockets
      # regardless of their on-host ownership — no UID-matching needed.
      - /tmp:/tmp
      - /run/screen:/run/screen:ro
      # So Bridge can read modules.list from the core repo.
      - ${RYDBERG_ROOT:-~/Rydberg}:/rydberg-root:ro

    # Root is required here to reliably access the mounted Docker socket
    # and host telemetry interfaces in heterogeneous host setups.

    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"   # video — verify with `getent group video` on THIS server
      - "993"  # render — verify with `getent group render` on THIS server

    environment:
      RYDBERG_ROOT: /rydberg-root
      HOST_PROC: /host/proc

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bridge-be.rule=Host(`bridge.rydberg.app`) && PathPrefix(`/api`)"
      - "traefik.http.routers.bridge-be.entrypoints=web"
      - "traefik.http.routers.bridge-be.priority=10"
      - "traefik.http.services.bridge-be.loadbalancer.server.port=8080"

    networks:
      - rydberg-net

    cap_add:
    - PERFMON   # required for intel_gpu_top to read GPU counters via perf_event_open()

networks:
  rydberg-net:
    external: true