services:
  frontend-bridge:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rydberg-frontend-bridge
    restart: unless-stopped
    profiles:
      - bridge
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      CHOKIDAR_USEPOLLING: "true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bridge-fe.rule=Host(`bridge.rydberg.app`)"
      - "traefik.http.routers.bridge-fe.entrypoints=web"
      - "traefik.http.services.bridge-fe.loadbalancer.server.port=5173"
    depends_on:
      - backend-bridge
    networks:
      - rydberg-net

networks:
  rydberg-net:
    external: true